<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
   
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/shopsmarket.css">

</head>
<body>
    <main class="container">
        <header class="header">
          <span class="material-symbols-outlined logo-icon">shopping_cart</span>
          <h1>ShopSmart<span>Pro</span></h1>
        </header>
  
        <section class="card">
          <div class="inputs">
            <div class="input-group">
              <label>Valor 01</label>
              <input
                type="number"
                id="valor01"
                step="0.01"
                placeholder="Ex: 199.90"
              />
            </div>
  
            <div class="input-group">
              <label>Valor 02</label>
              <input
                type="number"
                id="valor02"
                step="0.01"
                placeholder="Ex: 10"
              />
            </div>
          </div>
  
          <div class="buttons">
            <button onclick="calcularTotal()">
              <span class="material-symbols-outlined">calculate</span>
              TOTAL
            </button>
  
            <button onclick="desconto()">
              <span class="material-symbols-outlined">sell</span>
              DESCONTO
            </button>
  
            <button onclick="juros()">
              <span class="material-symbols-outlined">trending_up</span>
              JUROS
            </button>
  
            <button onclick="comissao()">
              <span class="material-symbols-outlined">payments</span>
              COMISSÃO
            </button>
  
            <button onclick="lucro()">
              <span class="material-symbols-outlined">attach_money</span>
              LUCRO
            </button>
  
            <button class="btn-clear" onclick="limpar()">
              <span class="material-symbols-outlined">delete</span>
              LIMPAR
            </button>
          </div>
        </section>
  
        <section class="resultado" id="resultado">
          <!-- Código injetado por JavaScript -->
          </div>
        </div>
      </section>
  
      <script src="./js/app.js"></script>
        </section>
      </main>  
    <!-- <script src="../js/navegacao.js"></script> -->
    <script src="../js/global-auto.js"></script>
    <!-- <script src="../js/global-auto.js"></script> -->
</body>
</html>
